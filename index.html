<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra mật khẩu</title>
</head>
<body>
    <h2>Kiểm tra mật khẩu</h2>
    <script>
        function checkPassword(password) {
            const minLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[^A-Za-z0-9]/.test(password);

            let errors = [];

            if (!minLength) errors.push("Mật khẩu phải có ít nhất 8 ký tự.");
            if (!hasUpper) errors.push("Mật khẩu phải có ít nhất 1 chữ hoa (A-Z).");
            if (!hasLower) errors.push("Mật khẩu phải có ít nhất 1 chữ thường (a-z).");
            if (!hasNumber) errors.push("Mật khẩu phải có ít nhất 1 chữ số (0-9).");
            if (!hasSpecial) errors.push("Mật khẩu phải có ít nhất 1 ký tự đặc biệt.");

            if (errors.length > 0) {
                return { valid: false, messages: errors };
            }

            // Xác định độ mạnh
            let strength = "";
            if (password.length >= 12) {
                strength = "Mạnh";
            } else {
                strength = "Trung bình";
            }

            return { valid: true, strength: strength };
        }

        function askPassword() {
            let password;

            while (true) {
                password = prompt("Nhập mật khẩu:");

                if (password === null) {
                    alert("Bạn đã hủy nhập.");
                    return;
                }

                let result = checkPassword(password);

                if (!result.valid) {
                    alert("Mật khẩu không hợp lệ:\n" + result.messages.join("\n"));
                } else {
                    let strength = result.strength;

                    if (password.length === 8) {
                        strength = "Yếu";
                    }

                    alert("Mật khẩu hợp lệ!\nĐộ mạnh: " + strength);
                    console.log("Mật khẩu hợp lệ!");
                    console.log("Độ mạnh:", strength);
                    break;
                }
            }
        }

        // Chạy chương trình
        askPassword();
    </script>
</body>
</html>
